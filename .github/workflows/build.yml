name: Build & Release Nightly

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                target: [android, windows, linux]
                include:
                    - target: android
                      os: ubuntu-latest
                      build_cmd: flutter build apk --release --no-tree-shake-icons
                      artifact_path: build/app/outputs/flutter-apk/app-release.apk
                      artifact_name: Emvia-Android.apk
                    - target: windows
                      os: windows-latest
                      build_cmd: flutter build windows --release
                      artifact_path: build/windows/x64/runner/Release/
                      artifact_name: Emvia-Windows
                    - target: linux
                      os: ubuntu-latest
                      build_cmd: flutter build linux --release
                      artifact_path: build/linux/x64/release/bundle/
                      artifact_name: Emvia-Linux
        steps:
            - uses: actions/checkout@v4

            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                sudo apt-get update
                sudo apt-get install -y \
                  clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
                  build-essential g++ \
                  libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true

            - name: Flutter pub get
              run: flutter pub get

            - name: Build
              run: ${{ matrix.build_cmd }}

            - name: Package Linux
              if: matrix.target == 'linux'
              run: |
                cd build/linux/x64/release/bundle
                zip -r ../../../../../Emvia-Linux.zip .

            - name: Package Windows
              if: matrix.target == 'windows'
              shell: pwsh
              run: |
                Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Emvia-Windows.zip

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: |
                    ${{ matrix.target == 'android' && 'build/app/outputs/flutter-apk/app-release.apk' || '' }}
                    ${{ matrix.target == 'windows' && 'Emvia-Windows.zip' || '' }}
                    ${{ matrix.target == 'linux' && 'Emvia-Linux.zip' || '' }}

    release:
        name: Create/Update Nightly Release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Get current date
              id: date
              run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

            - name: Create or Update Nightly Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: nightly
                  name: Nightly Build
                  body: |
                    ## 🌙 Nightly Build
                    
                    **Build Date:** ${{ steps.date.outputs.date }}
                    **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
                    **Branch:** `${{ github.ref_name }}`
                    
                    Automated nightly releases for Android, Windows, and Linux.
                  prerelease: true
                  make_latest: true
                  files: |
                    artifacts/app-release.apk
                    artifacts/Emvia-Windows.zip
                    artifacts/Emvia-Linux.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


