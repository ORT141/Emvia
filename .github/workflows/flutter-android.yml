name: Build Android (Flutter)

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-android:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable

            - name: Install system deps & Android command-line tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends unzip wget openjdk-11-jdk
                  export ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
                  mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
                        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
                        unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
                        mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
                        yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"
                        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

            - name: Cache pub & Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.pub-cache
                      android/.gradle
                      ~/.gradle
                  key: ${{ runner.os }}-pub-gradle-${{ hashFiles('**/pubspec.yaml') }}

            - name: Flutter pub get
              run: flutter pub get

            - name: Build APK (release)
              run: flutter build apk --release --no-tree-shake-icons

            - name: Build App Bundle (optional)
              run: flutter build appbundle --release || true

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-release-apk
                  path: build/app/outputs/flutter-apk/app-release.apk

            - name: Upload AAB artifact (if produced)
              uses: actions/upload-artifact@v4
              with:
                  name: app-release-aab
                  path: build/app/outputs/bundle/release/app-release.aab
                  if-no-files-found: ignore
