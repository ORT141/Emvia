name: emvia
description: 'Emvia, a simple relaxing game to unwind and find your inner peace.'
publish_to: 'none'

version: 1.0.0+1

environment:
    sdk: ^3.10.7

dependencies:
    flutter:
        sdk: flutter

    flame: ^1.34.0
    flame_audio: ^2.11.12
    google_fonts: ^7.0.2
    cupertino_icons: ^1.0.8

    flutter_localizations:
        sdk: flutter

    intl: 0.20.2
    shared_preferences: ^2.5.4
    http: ^1.2.0
    flutter_launcher_icons: ^0.14.4
    path_provider: ^2.1.5
    open_filex: ^4.7.0
    camera: ^0.12.0+1
    permission_handler: ^12.0.1

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0

flutter:
    generate: true
    uses-material-design: true

    assets:
        - assets/images/
        - assets/images/misc/
        - assets/images/misc/camera/
        - assets/images/main-menu/
        - assets/images/stress/
        - assets/images/player/

        - assets/images/player-selecting/

        # olya specific

        - assets/images/player/olya/

        - assets/images/scenes/olya/classroom/
        - assets/images/scenes/olya/outside/
        - assets/images/scenes/olya/corridor/
        - assets/images/scenes/olya/second-corridor/
        - assets/images/scenes/olya/stage/
        - assets/images/scenes/olya/scene/

        - assets/images/stress/stress-scene/

        - assets/images/misc/olya-backpack/

        - assets/sounds/olya/paths/
        - assets/sounds/olya/items/

        # ------------------

        # liam specific
        - assets/images/player/liam/
        - assets/images/scenes/liam/house/
        - assets/images/scenes/liam/outside/
        - assets/images/wall-patterns/
        - assets/images/misc/liam-cafe-entrance/

        # ------------------

        - assets/sounds/survey/
        - assets/sounds/player-cards/
        - assets/sounds/tips/
        - assets/sounds/other/
